<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"><title>CPU TESTER | Live GHz & Properties</title><style>*{margin:0;padding:0;box-sizing:border-box;user-select:none;}body{margin:0;padding:0;overflow:hidden;position:fixed;top:0;left:0;right:0;bottom:0;background-color:#000;font-family:'SF Mono','Monaco','Cascadia Code','Fira Code',monospace;}canvas{display:block;position:fixed;top:0;left:50%;width:200%;height:100%;transform:translateX(-50%);z-index:1;filter:saturate(2) contrast(0.9);}.stats-panel{position:fixed;top:20px;left:20px;z-index:3;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);padding:12px 20px;border-radius:5px;color:#ffffff;font-size:11px;font-family:monospace;pointer-events:none;letter-spacing:0.5px;}.stats-panel div{margin:2px 0;}.info-panel{position:fixed;bottom:20px;left:20px;z-index:3;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);padding:12px 24px;border-radius:40px;color:rgba(255,255,255,0.95);font-size:14px;pointer-events:none;font-weight:500;border:1px solid rgba(255,255,255,0.25);}.score-badge{position:fixed;bottom:20px;right:20px;z-index:3;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);padding:16px 28px;border-radius:5px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.5);pointer-events:none;}.score-label{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:#ffaa66;margin-bottom:6px;}.score-value{font-size:36px;font-weight:800;color:#fff;line-height:1;text-shadow:0 0 12px rgba(255,170,102,0.5);}.score-category{font-size:11px;color:#aaa;margin-top:6px;}.fullscreen-btn{position:fixed;top:20px;right:20px;z-index:3;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.25);color:white;padding:8px 18px;border-radius:40px;cursor:pointer;font-family:monospace;font-size:13px;font-weight:500;transition:all 0.2s ease;pointer-events:auto;}.fullscreen-btn:hover{background:rgba(255,255,255,0.2);transform:scale(1.02);}.ui-hidden .stats-panel,.ui-hidden .info-panel,.ui-hidden .score-badge,.ui-hidden .fullscreen-btn{opacity:0;transition:opacity 0.4s ease;}.ui-hidden:hover .stats-panel,.ui-hidden:hover .info-panel,.ui-hidden:hover .score-badge,.ui-hidden:hover .fullscreen-btn{opacity:1;}</style></head><body><div class="stats-panel" id="statsPanel">🔍 ESTIMATING CPU...</div><div class="info-panel"><strong>🌀 LIVE CPU MONITOR</strong> | 10 iter fractal | real-time GHz</div><div class="score-badge"><div class="score-label">CPU POWER SCORE</div><div class="score-value" id="scoreValue">--</div><div class="score-category" id="scoreCategory">ANALYZING</div></div><button class="fullscreen-btn" id="fullscreenBtn">⛶ FULL</button><script>(function(){const canvas=document.createElement('canvas');canvas.style.position='fixed';canvas.style.top='0';canvas.style.left='50%';canvas.style.width='200%';canvas.style.height='100%';canvas.style.display='block';canvas.style.zIndex='1';canvas.style.transform="translateX(-50%)";canvas.style.filter="saturate(2) contrast(0.9)";document.body.appendChild(canvas);const gl=canvas.getContext('webgl2',{alpha:false,depth:false,stencil:false,antialias:true});if(!gl){const errDiv=document.createElement('div');errDiv.style.position='fixed';errDiv.style.top='50%';errDiv.style.left='50%';errDiv.style.transform='translate(-50%,-50%)';errDiv.style.background='#000';errDiv.style.color='#ff6666';errDiv.style.padding='24px';errDiv.style.borderRadius='16px';errDiv.style.zIndex='100';errDiv.style.fontFamily='monospace';errDiv.style.textAlign='center';errDiv.style.border='2px solid #ff6666';errDiv.innerHTML='WebGL2 NOT SUPPORTED';document.body.appendChild(errDiv);throw new Error('WebGL2 missing');}let width=window.innerWidth;let height=window.innerHeight;function setCanvasSize(){width=window.innerWidth+100;height=window.innerHeight;canvas.width=width;canvas.height=height;gl.viewport(0,0,width,height);if(uniforms&&uniforms.u_resolution)gl.uniform2f(uniforms.u_resolution,width,height);}const vsSource=`#version 300 es\nin vec2 a_position;\nout vec2 v_uv;\nvoid main(){\ngl_Position=vec4(a_position,0.0,1.0);\nv_uv=a_position*0.5+0.5;\n}`;const fsSource=`#version 300 es\nprecision highp float;\nin vec2 v_uv;\nuniform float u_time;\nuniform vec2 u_resolution;\nout vec4 outColor;\nvoid main(){\nfloat aspect=u_resolution.x/u_resolution.y;\nvec2 uv=v_uv;\nvec2 p=(uv-0.5)*2.0;\np.x*=aspect;\nfloat t=u_time*0.65;\nvec3 c=vec3(0.0);\nfor(int i=0;i<10;++i){\nc=vec3(\nsin(c.r+cos(c.g+t*1.139+p.x*2.0)+tan(c.b*0.15+p.y)),\ncos(c.g+sin(c.b+t*1.003+p.y*2.0)+tan(c.r*0.15+p.x)),\nsin(c.b+cos(c.r+t*0.7831+p.x-p.y)+tan(c.g*0.15+p.x*p.y))\n);\n}\noutColor=vec4(0.5+0.5*sin(c),1.0);\n}`;function compileShader(gl,src,type,typeName){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){const log=gl.getShaderInfoLog(s);gl.deleteShader(s);throw new Error(typeName+' error:\\n'+log);}return s;}let program,uniforms;try{const vs=compileShader(gl,vsSource,gl.VERTEX_SHADER,'VERTEX');const fs=compileShader(gl,fsSource,gl.FRAGMENT_SHADER,'FRAGMENT');program=gl.createProgram();gl.attachShader(program,vs);gl.attachShader(program,fs);gl.linkProgram(program);if(!gl.getProgramParameter(program,gl.LINK_STATUS))throw new Error('Link failed');gl.useProgram(program);gl.deleteShader(vs);gl.deleteShader(fs);const posBuf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,posBuf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);const posLoc=gl.getAttribLocation(program,'a_position');gl.enableVertexAttribArray(posLoc);gl.vertexAttribPointer(posLoc,2,gl.FLOAT,false,0,0);uniforms={u_time:gl.getUniformLocation(program,'u_time'),u_resolution:gl.getUniformLocation(program,'u_resolution')};setCanvasSize();gl.uniform1f(uniforms.u_time,0);}catch(e){console.error(e);const errDiv=document.createElement('div');errDiv.style.position='fixed';errDiv.style.top='50%';errDiv.style.left='50%';errDiv.style.transform='translate(-50%,-50%)';errDiv.style.background='black';errDiv.style.color='red';errDiv.style.padding='20px';errDiv.style.borderRadius='12px';errDiv.style.zIndex='200';errDiv.style.fontFamily='monospace';errDiv.innerHTML='SHADER ERROR';document.body.appendChild(errDiv);throw e;}let startTime=performance.now()/1000;let animationId=null;let isVisible=true;let testCompleted=false;let finalScore=null;let benchmarkSamples=[];let benchmarkActive=true;let benchmarkStart=0;const BENCH_DURATION=3000;const scoreValueSpan=document.getElementById('scoreValue');const scoreCategorySpan=document.getElementById('scoreCategory');const statsPanel=document.getElementById('statsPanel');let lastTimestamp=0;let cpuGHZ=2.5;let cpuCores=navigator.hardwareConcurrency||4;let memoryGB=0;if(performance.memory){memoryGB=Math.round(performance.memory.jsHeapSizeLimit/(1024*1024*1024)*10)/10;}else{memoryGB=4;}let cpuModel='Browser';let liveFPS=60;let fpsSamples=[];function updateLiveStats(estimatedGHz,fpsVal,loadPercent){let coresInfo=cpuCores+' cores';let memInfo=memoryGB+'GB RAM';let ghzFixed=estimatedGHz.toFixed(2);let loadFixed=Math.min(100,Math.floor(loadPercent));statsPanel.innerHTML=`🖥️ ${cpuModel} | ${coresInfo} | ${memInfo}<br>⚡ ${ghzFixed} GHz | 🎮 ${Math.floor(fpsVal)} FPS | 🔥 ${loadFixed}% load`;}function updateScoreUI(score){let category='';let colorStyle='';if(score>=85){category='🔥 EXTREME POWER';colorStyle='#ff5500';}else if(score>=70){category='⚡ HIGH PERFORMANCE';colorStyle='#ffaa33';}else if(score>=55){category='✅ GOOD MULTITASKING';colorStyle='#88ff88';}else if(score>=40){category='📱 MODERATE';colorStyle='#66ccff';}else if(score>=25){category='💻 BASIC';colorStyle='#ffaa66';}else{category='⚠️ LOW POWER';colorStyle='#ff6666';}scoreValueSpan.innerText=Math.floor(score);scoreCategorySpan.innerText=category;scoreValueSpan.style.textShadow=`0 0 15px ${colorStyle}`;}function computeFinalScore(){if(benchmarkSamples.length===0)return 45;let sum=0;for(let v of benchmarkSamples)sum+=v;let avg=sum/benchmarkSamples.length;let normalized=Math.min(100,Math.max(0,(avg/16.666)*100));if(normalized>100)normalized=100;if(normalized<5)normalized=5;return Math.floor(normalized);}function endBenchmark(){if(testCompleted)return;benchmarkActive=false;testCompleted=true;finalScore=computeFinalScore();updateScoreUI(finalScore);let ghzFromScore=Math.min(5.5,Math.max(0.8,1.8+(finalScore-50)/25));cpuGHZ=ghzFromScore;}function collectFrameTime(deltaMs){if(!benchmarkActive)return;if(benchmarkStart===0){benchmarkStart=performance.now();return;}const now=performance.now();if(now-benchmarkStart>=BENCH_DURATION){if(!testCompleted)endBenchmark();return;}if(deltaMs>0&&deltaMs<100){const fps=1000/deltaMs;fpsSamples.push(fps);if(fpsSamples.length>30)fpsSamples.shift();let avgFps=0;if(fpsSamples.length)avgFps=fpsSamples.reduce((a,b)=>a+b,0)/fpsSamples.length;let rawPerf=Math.min(100,Math.max(0,(avgFps/60)*100));let dynamicGHz=1.6+(rawPerf/100)*3.8;cpuGHZ=Math.min(5.2,Math.max(0.9,dynamicGHz));const perfScore=rawPerf;benchmarkSamples.push(perfScore);if(benchmarkSamples.length>60)benchmarkSamples.shift();const currentEstimate=computeFinalScore();if(!testCompleted)scoreValueSpan.innerText=currentEstimate;let loadEst=Math.min(99,Math.max(5,Math.floor((100-rawPerf)*0.8+15)));updateLiveStats(cpuGHZ,avgFps,loadEst);}}function render(nowSec){if(!isVisible){animationId=requestAnimationFrame((t)=>render(t/1000));return;}const elapsed=nowSec-startTime;if(uniforms.u_time)gl.uniform1f(uniforms.u_time,elapsed);gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);gl.drawArrays(gl.TRIANGLES,0,3);const nowMs=performance.now();if(lastTimestamp!==0){const delta=nowMs-lastTimestamp;if(delta>0.5&&delta<200){if(!testCompleted&&benchmarkActive){collectFrameTime(delta);}else if(testCompleted){const fps=1000/delta;fpsSamples.push(fps);if(fpsSamples.length>30)fpsSamples.shift();let avgFps=fpsSamples.reduce((a,b)=>a+b,0)/fpsSamples.length;let loadIdle=Math.min(30,Math.max(2,Math.floor((70-avgFps)*0.8)));updateLiveStats(cpuGHZ,avgFps,loadIdle);}}lastTimestamp=nowMs;}else{lastTimestamp=nowMs;}animationId=requestAnimationFrame((ts)=>render(ts/1000));}function start(){startTime=performance.now()/1000;lastTimestamp=0;benchmarkStart=0;benchmarkSamples=[];fpsSamples=[];testCompleted=false;benchmarkActive=true;cpuGHZ=2.5;updateLiveStats(2.5,60,15);setTimeout(()=>{if(benchmarkActive&&!testCompleted)endBenchmark();},BENCH_DURATION+100);render(startTime);}const fullBtn=document.getElementById('fullscreenBtn');function toggleFull(){if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(e=>{});fullBtn.textContent='✖ EXIT';}else{document.exitFullscreen();fullBtn.textContent='⛶ FULL';}}fullBtn.addEventListener('click',toggleFull);document.addEventListener('fullscreenchange',()=>{if(document.fullscreenElement){fullBtn.textContent='✖ EXIT';document.body.classList.add('ui-hidden');setTimeout(()=>setCanvasSize(),80);}else{fullBtn.textContent='⛶ FULL';document.body.classList.remove('ui-hidden');setCanvasSize();}});let inactivityTimer;function resetInactivity(){if(document.fullscreenElement){document.body.classList.remove('ui-hidden');clearTimeout(inactivityTimer);inactivityTimer=setTimeout(()=>{if(document.fullscreenElement)document.body.classList.add('ui-hidden');},2500);}}document.addEventListener('mousemove',resetInactivity);document.addEventListener('click',resetInactivity);document.addEventListener('keydown',resetInactivity);resetInactivity();window.addEventListener('resize',()=>{setCanvasSize();});window.addEventListener('orientationchange',()=>setTimeout(setCanvasSize,60));document.addEventListener('visibilitychange',()=>{isVisible=!document.hidden;if(isVisible){if(!animationId){const nowPerf=performance.now()/1000;startTime=nowPerf-(performance.now()/1000-startTime);render(nowPerf);}}else if(animationId){cancelAnimationFrame(animationId);animationId=null;}});start();setTimeout(()=>{if(benchmarkActive&&benchmarkSamples.length<8){let fallbackScore=48;scoreValueSpan.innerText=fallbackScore;scoreCategorySpan.innerText='📡 ESTIMATED';if(!testCompleted){testCompleted=true;benchmarkActive=false;finalScore=fallbackScore;updateScoreUI(fallbackScore);cpuGHZ=2.3;updateLiveStats(2.3,55,20);}}},BENCH_DURATION+200);})();</script></body></html>
